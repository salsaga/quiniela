<!DOCTYPE html>
<!-- Alternativa C: una sola línea — título a la izquierda (deja de estar
     centrado), rank-chip + user-chip a la derecha. Autocontenido para CodePen. -->
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Header C — una línea</title>
<style>
  :root {
    --bg: #0f1115;
    --surface: #232732;
    --text: #e7e7e7;
    --muted: rgb(180, 180, 180);
    --gold: #d4af37;
    --gold-soft: rgba(212, 175, 55, 0.14);
    --gold-text: #cdb36f;
    --header-bg: rgba(15, 17, 21, 0.92);
    --radius-pill: 999px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: system-ui, sans-serif;
  }
  .phone {
    max-width: 360px;
    min-height: 60vh;
    margin: 24px auto;
    border: 1px dashed #444;
    overflow: hidden;
  }

  .header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 12px;
    height: 52px;
    background: var(--header-bg);
    border-bottom: 1px solid rgba(255, 255, 255, 0.06);
  }
  .title {
    margin: 0 auto 0 0; /* a la izquierda; empuja el resto a la derecha */
    font-size: 16px;
    letter-spacing: 0.8px;
  }
  .title::after {
    content: "";
    display: block;
    height: 2px;
    width: 58%;
    margin-top: 1px;
    background: var(--gold);
    opacity: 0.6;
  }
  .title span { font-size: 14px; padding-right: 3px; }

  .rank-chip {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 5px 10px;
    border-radius: var(--radius-pill);
    border: 1px solid rgba(212, 175, 55, 0.45);
    background: var(--gold-soft);
    color: var(--text);
    text-decoration: none;
    font-size: 12px;
    font-weight: 600;
    white-space: nowrap;
  }
  .rank-chip:active { background: rgba(212, 175, 55, 0.25); }
  .rank-chip .pos { color: var(--gold-text); font-weight: 800; }
  .rank-chip .pts { color: var(--muted); font-size: 11px; }

  .user-chip {
    display: flex;
    align-items: center;
    padding: 6px 8px;
    border-radius: var(--radius-pill);
    border: none;
    background: rgba(255, 255, 255, 0.1);
  }
  .user-chip svg { width: 16px; height: 16px; fill: var(--text); }

  .stage-tabs { display: flex; gap: 8px; padding: 8px 10px; background: var(--header-bg); overflow-x: auto; }
  .stage-tab {
    flex: 0 0 auto;
    padding: 6px 12px;
    border-radius: 7px;
    border: 1px solid rgba(255,255,255,0.3);
    background: var(--surface);
    color: var(--muted);
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    text-decoration: none;
    white-space: nowrap;
  }
  .stage-tab.active { color: var(--gold-text); background: var(--gold-soft); border-color: rgba(212, 175, 55, 0.5); }
</style>
</head>
<body>
<div class="phone">

  <header class="header">
    <h1 class="title"><span>⚽</span>sanginiela</h1>
    <a class="rank-chip" href="#posiciones" title="Tabla de posiciones">
      <span>🏆</span>
      <span class="pos">1°</span>
      <span class="pts">4 pts</span>
    </a>
    <button class="user-chip">
      <svg viewBox="0 0 24 24"><path d="M12 12a5 5 0 1 0-5-5 5 5 0 0 0 5 5zm0 2c-4.42 0-8 1.79-8 4v2h16v-2c0-2.21-3.58-4-8-4z"/></svg>
    </button>
  </header>

  <nav class="stage-tabs">
    <a class="stage-tab" href="#">reglas</a>
    <a class="stage-tab active" href="#">grupos</a>
    <a class="stage-tab" href="#">⚽ en juego</a>
    <a class="stage-tab" href="#">dieciseisavos</a>
  </nav>

</div>
</body>
</html>
